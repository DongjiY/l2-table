<!DOCTYPE html>
<html lang="en">
  <head>
    <style></style>
  </head>
  <body>
    <h1>Test Page</h1>
    <p>This is a simple test page.</p>
    <div id="table"></div>

    <script src="https://unpkg.com/rxjs@7/dist/bundles/rxjs.umd.min.js"></script>
    <script src="../dist/index.global.js"></script>
    <script>
      const { interval } = rxjs;
      const { map, mergeMap } = rxjs.operators;

      class StringTableData extends L2Table.TableData {
        constructor() {
          super(undefined);
        }

        compare(a, b) {
          if (a < b) return -1;
          if (a > b) return 1;
          return 0;
        }

        toString(value) {
          return value;
        }
      }

      // --- Define row type ---
      // For this test, all columns are strings
      // Each row must have an "id" and other keys matching column ids
      function createRow(id) {
        return { id };
      }

      // --- Generate columns ---
      const columns = Array.from({ length: 10 }, (_, i) => ({
        id: String(i),
        header: `Column ${i + 1}`,
        minW: 80,
        maxW: 150,
        // cellDataFactory must return TableData for this column's type (string)
        cellDataFactory: () => new StringTableData(),
      }));

      // --- Generate rows ---
      const numRows = 200;
      const rows = Array.from({ length: numRows }, (_, i) =>
        createRow(String(i))
      );

      // --- Table configuration ---
      const tableConfig = {
        columns,
        rows,
        headerHeight: 40,
        rowHeight: 40,
      };

      // --- Random string generator ---
      function randomString() {
        return Math.random().toString(36).substring(2, 6);
      }

      // --- Observable source ---
      const sourceObservable = interval(400).pipe(
        map(() => {
          const updates = [];
          const rowsToUpdate = rows; // Can slice for stress testing

          for (const row of rowsToUpdate) {
            for (const column of columns) {
              updates.push({
                rowId: row.id,
                columnId: column.id,
                content: randomString(),
              });
            }
          }
          return updates;
        }),
        mergeMap((arr) => arr) // flatten so each emission is a single SourceData
      );

      // --- Create the table ---
      const table = new L2Table.Table(
        document.getElementById("table"),
        sourceObservable,
        tableConfig
      );
    </script>
  </body>
</html>
